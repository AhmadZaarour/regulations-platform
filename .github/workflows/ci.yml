name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  quality:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: regs
          POSTGRES_USER: regs
          POSTGRES_PASSWORD: regs
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U regs -d regs"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      ENV: test
      LOG_LEVEL: INFO
      SECRET_KEY: test-secret-key

      POSTGRES_DB: regs
      POSTGRES_USER: regs
      POSTGRES_PASSWORD: regs
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432

      REDIS_HOST: localhost
      REDIS_PORT: 6379
      REDIS_DB: 0

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install "SQLAlchemy>=2.0" "psycopg[binary]" alembic rq redis types-redis python-jose "passlib[argon2]" argon2-cffi

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Black check
        run: black --check .

      - name: Mypy
        run: mypy src

      - name: Run migrations
        run: alembic upgrade head

      - name: Pytest
        run: pytest

  docker-build:
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t regulations-api:ci .