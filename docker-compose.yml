services:
  db:
    image: postgres:16
    container_name: regs_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-regs}
      POSTGRES_USER: ${POSTGRES_USER:-regs}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-regs}
    ports:
      - "5432:5432"
    volumes:
      - regs_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-regs} -d ${POSTGRES_DB:-regs}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Optional (nice for viewing tables)
  pgadmin:
    image: dpage/pgadmin4:8
    container_name: regs_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@local.dev}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
    ports:
      - "5050:80"
    depends_on:
      - db

  redis:
    image: redis:7
    container_name: regs_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  regs_pgdata:
